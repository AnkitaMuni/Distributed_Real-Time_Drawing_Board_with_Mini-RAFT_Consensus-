services:
  replica1:
    build: ./replica1
    container_name: replica1
    environment:
      - REPLICA_ID=replica1
      - REPLICA_PORT=4001
      - PEERS=http://replica2:4002,http://replica3:4003
      - NODE_PATH=/usr/local/lib/node_modules
    ports:
      - "4001:4001"
      - "8081:8080"
    volumes:
      - ./replica1:/app
      - /app/node_modules  # This "anonymous volume" protects the container's modules
      - ./frontend/index.html:/app/index.html
    networks:
      - raft-net

  replica2:
    build: ./replica2
    container_name: replica2
    environment:
      - REPLICA_ID=replica2
      - REPLICA_PORT=4002
      - PEERS=http://replica1:4001,http://replica3:4003
      - NODE_PATH=/usr/local/lib/node_modules
    ports:
      - "4002:4002"
      - "8082:8080"
    volumes:
      - ./replica2:/app
      - /app/node_modules
      - ./frontend/index.html:/app/index.html
    networks:
      - raft-net

  replica3:
    build: ./replica3
    container_name: replica3
    environment:
      - REPLICA_ID=replica3
      - REPLICA_PORT=4003
      - PEERS=http://replica1:4001,http://replica2:4002
      - NODE_PATH=/usr/local/lib/node_modules
    ports:
      - "4003:4003"
      - "8083:8080"
    volumes:
      - ./replica3:/app
      - /app/node_modules
      - ./frontend/index.html:/app/index.html
    networks:
      - raft-net

  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      - GATEWAY_PORT=3000
      - REPLICAS=http://replica1:4001,http://replica2:4002,http://replica3:4003
      - NODE_PATH=/usr/local/lib/node_modules
    ports:
      - "3000:3000"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    networks:
      - raft-net

networks:
  raft-net:
    driver: bridge